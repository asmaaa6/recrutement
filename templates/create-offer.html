{% extends "base.html" %}

{% block title %}Créer une offre - RecrutAI{% endblock %}

{% block content %}
<div class="container py-5">
  <h2 class="fw-bold mb-2">Créer une offre</h2>
  <p class="text-muted">Remplissez les informations de l'offre.</p>

  <form method="POST" class="needs-validation" novalidate>
    <div class="row g-3">
      <div class="col-12 col-lg-6">
        <label class="form-label fw-bold">Titre</label>
        <input class="form-control" name="title" required>
      </div>
      <div class="col-12 col-lg-6">
        <label class="form-label fw-bold">Entreprise</label>
        <input class="form-control" name="company" required>
      </div>
      <div class="col-12 col-lg-6">
        <label class="form-label fw-bold">Localisation</label>
        <input class="form-control" name="location">
      </div>
      <div class="col-12 col-lg-6">
        <label class="form-label fw-bold">Type de contrat</label>
        <input class="form-control" name="job_type" value="CDI">
      </div>

      <div class="col-12">
        <label class="form-label fw-bold">Description</label>
        <textarea class="form-control" name="description" rows="5" required></textarea>
      </div>

      <div class="col-12">
        <label class="form-label fw-bold">Compétences requises (séparées par des virgules)</label>
        <input class="form-control" name="required_skills" placeholder="python, sql, flask">
      </div>

      <div class="col-12">
        <label class="form-label fw-bold">Compétences préférées (séparées par des virgules)</label>
        <input class="form-control" name="preferred_skills" placeholder="django, react">
      </div>
    </div>

    <div class="d-flex gap-2 mt-4">
      <button type="submit" class="btn btn-primary-custom">
        <i class="fas fa-save"></i> Enregistrer
      </button>
      <a class="btn btn-outline-primary" href="{{ url_for('offers.list_offers') }}">Annuler</a>
    </div>
  </form>
</div>
{% endblock %}
