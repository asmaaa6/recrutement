{% extends "base.html" %}

{% block title %}Modifier offre - RecrutAI{% endblock %}

{% block content %}
<div class="container py-5">
  <h2 class="fw-bold mb-2">Modifier l'offre</h2>
  <p class="text-muted">Mettez à jour les informations.</p>

  <form method="POST" class="needs-validation" novalidate>
    <div class="row g-3">
      <div class="col-12 col-lg-6">
        <label class="form-label fw-bold">Titre</label>
        <input class="form-control" name="title" value="{{ offer.title }}" required>
      </div>
      <div class="col-12 col-lg-6">
        <label class="form-label fw-bold">Entreprise</label>
        <input class="form-control" name="company" value="{{ offer.company }}" required>
      </div>
      <div class="col-12 col-lg-6">
        <label class="form-label fw-bold">Localisation</label>
        <input class="form-control" name="location" value="{{ offer.location or '' }}">
      </div>
      <div class="col-12 col-lg-6">
        <label class="form-label fw-bold">Type de contrat</label>
        <input class="form-control" name="job_type" value="{{ offer.job_type or 'CDI' }}">
      </div>

      <div class="col-12">
        <label class="form-label fw-bold">Description</label>
        <textarea class="form-control" name="description" rows="5" required>{{ offer.description }}</textarea>
      </div>

      <div class="col-12">
        <label class="form-label fw-bold">Compétences requises (séparées par des virgules)</label>
        <input class="form-control" name="required_skills" value="{{ offer.required_skills or '' }}">
      </div>

      <div class="col-12">
        <label class="form-label fw-bold">Compétences préférées (séparées par des virgules)</label>
        <input class="form-control" name="preferred_skills" value="{{ offer.preferred_skills or '' }}">
      </div>
    </div>

    <div class="d-flex gap-2 mt-4">
      <button type="submit" class="btn btn-primary-custom">
        <i class="fas fa-save"></i> Mettre à jour
      </button>
      <a class="btn btn-outline-primary" href="{{ url_for('offers.view_offer', offer_id=offer.id) }}">Retour</a>
    </div>
  </form>
</div>
{% endblock %}
